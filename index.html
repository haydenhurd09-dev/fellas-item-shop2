<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Item Shop</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>FELLAS ITEM SHOP</h1>
  </header>
  <img src="images/skin1.jpg" width="300">

  <section id="featured">
    <h2>Season 1</h2>
    <div class="shop-grid" id="featured-items"></div>
  </section>

  <section id="daily">
    <h2>Daily</h2>
    <div class="shop-grid" id="daily-items"></div>
  </section>

  <script src="script.js"></script>

  <!-- 3D Viewer Modal -->
<div id="model-modal" class="modal">
  <div class="modal-content">
    <span id="close-modal" class="close">&times;</span>
    <div id="model-viewer-container" style="width: 600px; height: 400px;"></div>
  </div>
</div>
</body>
</html>
